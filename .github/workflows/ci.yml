name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Test (runs on PR + push to main) ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    outputs:
      migrations_changed: ${{ steps.filter.outputs.migrations }}
    steps:
      # fetch-depth: 0 (full history) so the explicit base/ref diff below always
      # has the commit objects it needs, regardless of history depth.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # base/ref MUST be pinned to the push event's exact before/after SHAs.
      # Without them, paths-filter's default for a *merge-commit* push falls
      # back to comparing the live tips of the source/target branch names
      # (logged as "Changes will be detected between dev and main") instead of
      # the event's fixed before/after SHAs. That default races
      # merge-back.yml, which fast-forwards dev to match main within seconds
      # of the same push — if it wins the race, dev and main are already
      # identical by the time this step runs, so the branch-tip diff is empty
      # and "0 changed files" is reported even though the merge genuinely
      # touched supabase/migrations/. This is what actually caused migration
      # 039 to be silently skipped twice (the earlier fetch-depth-only fix
      # addressed a real but different risk and did not fix this one — verified
      # by replaying run 29450921051's log, which still showed 0 changed files
      # even with full history). Pinning base/ref removes the live-branch
      # lookup entirely, so the race can't affect the result.
      - name: Check for migration file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            migrations:
              - 'supabase/migrations/**'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        with:
          path: ~/.supabase
          key: supabase-${{ hashFiles('supabase/config.toml') }}

      - uses: supabase/setup-cli@v1
        with:
          version: "2.98.2"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations
        run: supabase db reset --local

      - name: Run integration tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_URL: http://127.0.0.1:54321
          # Local Supabase demo JWT values — same for every local instance, safe to hardcode
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          # Not a real credential — a shared secret CI can hardcode safely, same as the JWT values above.
          INTERNAL_TASK_TOKEN: ci-test-internal-task-token
          FRONTEND_URL: http://localhost:5173
          NODE_ENV: test

      - run: supabase stop

  # ── Stage 2: Migrate DB (only on push to main when migrations changed) ──────
  migrate:
    needs: test
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.test.outputs.migrations_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: supabase/setup-cli@v1
        with:
          version: "2.98.2"

      - name: Link to production Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_DB_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Validate migration files
        run: node scripts/db-validate.mjs

      - name: Apply pending migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Lint production schema
        run: supabase db lint --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Stage 3: Deploy edge functions (after test passes; migrate may be skipped) ──
  # Railway deployment is triggered natively via "Wait for CI" in Railway
  # settings — it fires after all CI checks pass, which includes the migrate
  # job above. No railway up needed here.
  deploy-functions:
    needs: [test, migrate]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.test.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: supabase/setup-cli@v1
        with:
          version: "2.98.2"

      - run: supabase link --project-ref ${{ secrets.SUPABASE_DB_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: supabase functions deploy meta-conversions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
